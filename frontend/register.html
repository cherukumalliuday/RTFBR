<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MEDIQUEUE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
        const firebaseConfig = {
            apiKey: "AIzaSyAREKZ5z9gMcIm9j5DIC54JuGFcfVNIF0I",
            authDomain: "mediqueue-14b0d.firebaseapp.com",
            projectId: "mediqueue-14b0d",
            storageBucket: "mediqueue-14b0d.firebasestorage.app",
            messagingSenderId: "714545660145",
            appId: "1:714545660145:web:b4368186330d7f8dd92950",
            measurementId: "G-6X6H6M4W51"
        };
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
    </script>
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--bg-color), #1a1a2e); padding: 2rem; }
        .login-container { width: 100%; max-width: 520px; }
        .error-msg { color: var(--danger-color); font-size: 0.85rem; margin-top: 0.5rem; display: none; text-align: center; }
        .login-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .login-tab { flex: 1; padding: 0.7rem; border-radius: 10px; border: 1px solid var(--panel-border); background: rgba(255,255,255,0.03); color: var(--text-muted); cursor: pointer; text-align: center; font-size: 0.9rem; font-family: 'Poppins', sans-serif; }
        .login-tab.active { background: var(--gradient-btn); color: #fff; border-color: transparent; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="glass-panel">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="fa-solid fa-user-plus" style="font-size: 2.5rem; background: var(--gradient-text); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;"></i>
                <h2 style="font-size: 1.8rem; margin-top: 0.5rem;">Create Account</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Join MEDIQUEUE today</p>
            </div>

            <div class="login-tabs">
                <button class="login-tab active" data-role="patient"><i class="fa-solid fa-user"></i> Patient</button>
                <button class="login-tab" data-role="doctor"><i class="fa-solid fa-user-doctor"></i> Doctor</button>
            </div>

            <form id="register-form">
                <input type="hidden" id="selected-role" value="patient">
                <div class="dashboard-grid col-2" style="gap: 1rem;">
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label>Full Name</label>
                        <input type="text" id="reg-name" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label>Phone</label>
                        <input type="text" id="reg-phone" class="form-control" placeholder="+1 555 000 0000">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required>
                </div>

                <!-- Patient-specific fields -->
                <div id="patient-fields">
                    <div class="dashboard-grid col-2" style="gap: 1rem;">
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>Date of Birth</label>
                            <input type="date" id="reg-dob" class="form-control">
                        </div>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>Gender</label>
                            <select id="reg-gender" class="form-control">
                                <option value="">Select...</option>
                                <option>Male</option>
                                <option>Female</option>
                                <option>Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="dashboard-grid col-2" style="gap: 1rem;">
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>Blood Group</label>
                            <select id="reg-blood" class="form-control">
                                <option value="">Select...</option>
                                <option>A+</option><option>A-</option>
                                <option>B+</option><option>B-</option>
                                <option>O+</option><option>O-</option>
                                <option>AB+</option><option>AB-</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>Address</label>
                            <input type="text" id="reg-address" class="form-control" placeholder="123 Main St">
                        </div>
                    </div>
                </div>

                <!-- Doctor-specific fields -->
                <div id="doctor-fields" style="display: none;">
                    <div class="form-group">
                        <label>Department</label>
                        <select id="reg-department" class="form-control">
                            <option value="">Loading departments...</option>
                        </select>
                    </div>
                    <div class="dashboard-grid col-2" style="gap: 1rem;">
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>Specialization</label>
                            <input type="text" id="reg-specialization" class="form-control" placeholder="e.g. Cardiologist">
                        </div>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>Experience (Years)</label>
                            <input type="number" id="reg-experience" class="form-control" placeholder="5" min="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Qualification</label>
                        <input type="text" id="reg-qualification" class="form-control" placeholder="e.g. MBBS, MD">
                    </div>
                </div>

                <p id="reg-error" class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> <span id="reg-error-text">Error</span></p>
                <button type="submit" id="reg-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>
                <div style="text-align: center; margin-top: 1.5rem;">
                    <p style="color: var(--text-muted); font-size: 0.85rem;">Already have an account? <a href="login.html" style="color: var(--accent-color);">Login here</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
